name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (runs the `prepare` build)
        run: npm ci
      - name: Type-check / build
        run: npm run build
      - name: Test
        run: npm test
      - name: Smoke (offline data + parse checks)
        run: node dist/index.js --smoke
